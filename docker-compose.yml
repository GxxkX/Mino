# =============================================================================
# Mino All-in-One Docker Compose
# Usage: cp .env.example .env  →  edit .env  →  docker compose up -d
#
# All infrastructure services communicate over the internal `mino_net`
# network. Only the backend API (8000) and web UI (3000) are exposed
# to the host to avoid port conflicts.
# =============================================================================

networks:
  mino_net:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Infrastructure (internal only — no host ports)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: always
    networks:
      - mino_net
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_db_password}
      POSTGRES_DB: ${DB_NAME:-mino}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - mino_net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-your_redis_password}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-your_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: always
    networks:
      - mino_net
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO — shared by both Milvus and the application (audio storage)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    networks:
      - mino_net
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-your_minio_access_key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-your_minio_secret_key}
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.0-rc1
    restart: always
    networks:
      - mino_net
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-your_minio_access_key}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-your_minio_secret_key}
      MQ_TYPE: woodpecker
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  typesense:
    image: typesense/typesense:30.1
    restart: always
    networks:
      - mino_net
    volumes:
      - typesense_data:/data
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY:-your_typesense_api_key} --enable-cors"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8108'"]
      interval: 15s
      timeout: 60s
      retries: 5

  whisper:
    build:
      context: ./whisper
    restart: always
    networks:
      - mino_net
    environment:
      WHISPER_API_KEY: ${STT_WHISPER_API_KEY:-your_whisper_api_key}
      WHISPER_DEFAULT_MODEL: ${STT_WHISPER_MODEL:-tiny-zh}
    volumes:
      - whisper_cache:/root/.cache

  # ---------------------------------------------------------------------------
  # Application (host ports exposed)
  # ---------------------------------------------------------------------------

  backend:
    build:
      context: ./backend
    restart: always
    networks:
      - mino_net
    env_file: .env
    environment:
      # Override hosts to use docker service names
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: minio:9000
      TYPESENSE_HOST: typesense
      TYPESENSE_HOST_PORT: "8108"
      STT_WHISPER_API_URL: http://whisper:9000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      typesense:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        API_URL: http://backend:8000
    restart: always
    networks:
      - mino_net
    environment:
      API_URL: http://backend:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  milvus_data:
  minio_data:
  typesense_data:
  whisper_cache:
